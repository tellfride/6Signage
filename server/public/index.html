<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>6Signage — Painel de Controle</title>
<style>
:root{
  --bg:#0B0E14; --panel:#121826; --panel2:#0E1420; --line:#232D42;
  --text:#E8ECF4; --mut:#8A93A8; --faint:#4A5468;
  --acc:#5B8CFF; --acc-dim:#2B3F6E; --ok:#3DDC97; --err:#FF6B6B; --warn:#FFB84D;
  --mono:ui-monospace,'Cascadia Mono','Consolas','Menlo',monospace;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:4px}
::selection{background:var(--acc-dim)}

/* ---------- marca ---------- */
.tvmark{width:30px;height:22px;border:2px solid var(--acc);border-radius:4px;position:relative;flex-shrink:0}
.tvmark::after{content:'';position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);width:12px;height:2px;background:var(--acc);border-radius:2px}
.tvmark i{position:absolute;right:2px;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--ok);box-shadow:0 0 5px var(--ok)}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;letter-spacing:.3px}
.eyebrow{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:2px;color:var(--faint)}

/* ---------- login ---------- */
#login{max-width:380px;margin:16vh auto 0;padding:0 20px;display:flex;flex-direction:column;gap:14px}
#login .brand{justify-content:center;margin-bottom:2px;font-size:20px}
#login .eyebrow{text-align:center;margin-bottom:22px}
#login input{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:13px 15px;border-radius:10px;font-size:15px;width:100%}
#login input:focus{border-color:var(--acc);outline:none;box-shadow:0 0 0 3px rgba(91,140,255,.14)}
#login .btn{padding:13px}
#lerr{font-family:var(--mono);font-size:12.5px;color:var(--err);min-height:18px;text-align:center}

/* ---------- casca do app ---------- */
#app{display:none}
#app.on{display:grid;grid-template-columns:216px 1fr;min-height:100vh}
aside{background:var(--panel2);border-right:1px solid var(--line);padding:22px 14px;display:flex;flex-direction:column;gap:26px;position:sticky;top:0;height:100vh}
aside nav{display:flex;flex-direction:column;gap:3px}
aside nav button{display:flex;align-items:center;gap:11px;width:100%;padding:11px 12px;border:0;border-radius:9px;background:transparent;color:var(--mut);font-size:14px;cursor:pointer;text-align:left}
aside nav button svg{width:17px;height:17px;flex-shrink:0}
aside nav button:hover{color:var(--text);background:rgba(255,255,255,.03)}
aside nav button.active{background:var(--acc-dim);color:#fff}
.userbox{margin-top:auto;border-top:1px solid var(--line);padding-top:14px;font-size:12.5px;color:var(--mut);display:flex;flex-direction:column;gap:8px}
.userbox b{color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis}
main{padding:26px clamp(16px,3.5vw,40px) 90px;max-width:1180px;width:100%}
.pagehead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.pagehead h2{font-size:21px;font-weight:700;letter-spacing:.2px}
#topbar{display:none}

/* ---------- painel de estatísticas ---------- */
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 18px;min-width:128px;flex:1;max-width:200px}
.stat .k{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1.6px;color:var(--faint);margin-bottom:5px}
.stat .v{font-family:var(--mono);font-size:22px;font-weight:600}
.stat .v em{font-style:normal;font-size:13px;color:var(--mut)}
.stat.ok .v{color:var(--ok)} .stat.warn .v{color:var(--warn)}

/* ---------- video wall (cards de TV) ---------- */
.wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:16px}
.tvcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:box-shadow .3s,border-color .3s}
.tvcard.online{border-color:#1E4A38;box-shadow:0 0 22px -6px rgba(61,220,151,.18)}
.screen{aspect-ratio:16/9;background:linear-gradient(160deg,#05070C 0%,#0A0F1A 100%);position:relative;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line)}
.screen::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.012) 3px 4px);pointer-events:none}
.screen .now{font-family:var(--mono);font-size:12px;color:var(--mut);text-align:center;padding:0 18px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.screen .now b{display:block;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--faint);margin-bottom:6px;font-weight:500}
.screen .now.playing{color:var(--ok)}
.led{position:absolute;right:10px;bottom:8px;width:7px;height:7px;border-radius:50%}
.led.on{background:var(--ok);box-shadow:0 0 8px var(--ok);animation:pulse 2s infinite}
.led.off{background:#3A4356}
@keyframes pulse{50%{opacity:.4}}
@media (prefers-reduced-motion: reduce){.led.on{animation:none}}
.tvbody{padding:13px 15px 15px;display:flex;flex-direction:column;gap:10px}
.tvtitle{display:flex;align-items:center;gap:8px;justify-content:space-between}
.tvtitle .nm{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tvmeta{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.4px;display:flex;gap:10px;flex-wrap:wrap}
.tvrow{display:flex;gap:7px}
.tvrow select{flex:1;min-width:0}
.tvactions{display:flex;gap:7px}
.pill{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:1.2px;padding:3px 9px;border-radius:99px;flex-shrink:0}
.pill.on{background:rgba(61,220,151,.12);color:var(--ok)}
.pill.off{background:rgba(255,107,107,.10);color:var(--err)}
.pill.wait{background:rgba(255,184,77,.12);color:var(--warn)}

/* ---------- componentes ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.card h3{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap}
.row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
input,select{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:9px;font-size:13.5px;min-width:0}
input:focus,select:focus{border-color:var(--acc);outline:none}
input.grow{flex:1;min-width:150px}
.btn{background:var(--acc);color:#fff;border:0;padding:10px 16px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn:hover{filter:brightness(1.1)}
.btn.sm{padding:8px 12px;font-size:12.5px}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mut);font-weight:500}
.btn.ghost:hover{color:var(--text);border-color:var(--mut);filter:none}
.btn.danger{background:transparent;border:1px solid rgba(255,107,107,.35);color:var(--err);font-weight:500}
.btn.danger:hover{background:rgba(255,107,107,.1);filter:none}
.btn.approve{background:var(--ok);color:#06281B}
.list .item{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line);font-size:13.5px}
.list .item:last-child{border-bottom:0}
.item .grow{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.sub{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:3px;letter-spacing:.3px}
.thumb{width:64px;height:40px;object-fit:cover;border-radius:6px;background:#05070C;border:1px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:16px}
.pos{font-family:var(--mono);font-size:11px;color:var(--faint);width:22px;text-align:right;flex-shrink:0}
.icobtn{background:transparent;border:1px solid var(--line);color:var(--mut);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:13px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
.icobtn:hover{color:var(--text);border-color:var(--mut)}
.icobtn.del:hover{color:var(--err);border-color:var(--err)}
.empty{padding:36px 20px;text-align:center;color:var(--mut);font-size:13.5px;line-height:1.7}
.empty .eyebrow{margin-bottom:8px}

/* ---------- upload ---------- */
.drop{border:1.5px dashed var(--line);border-radius:var(--radius);padding:34px 20px;text-align:center;color:var(--mut);font-size:13.5px;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:16px}
.drop:hover,.drop.over{border-color:var(--acc);background:rgba(91,140,255,.05)}
.drop b{color:var(--text)}
.drop .sub{margin-top:6px}
.mediagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.mcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.mcard .mthumb{aspect-ratio:16/9;background:#05070C;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:22px}
.mcard .mthumb img{width:100%;height:100%;object-fit:cover}
.mcard .minfo{padding:9px 11px;display:flex;align-items:center;gap:6px}
.mcard .minfo .grow{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mcard .sub{margin-top:2px}

/* ---------- toasts ---------- */
#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:100;width:min(92vw,420px)}
.toast{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:10px;padding:12px 16px;font-size:13.5px;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:up .25s}
.toast.ok{border-left-color:var(--ok)} .toast.err{border-left-color:var(--err)}
@keyframes up{from{opacity:0;transform:translateY(8px)}}
@media (prefers-reduced-motion: reduce){.toast{animation:none}}

/* ---------- mobile ---------- */
@media(max-width:880px){
  #app.on{display:block}
  aside{display:none}
  #topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--panel2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  main{padding:18px 14px 96px}
  #tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--panel2);border-top:1px solid var(--line);z-index:20;padding-bottom:env(safe-area-inset-bottom)}
  #tabbar button{flex:1;padding:9px 4px 11px;border:0;background:transparent;color:var(--faint);font-size:10.5px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px}
  #tabbar button svg{width:19px;height:19px}
  #tabbar button.active{color:var(--acc)}
  .stats{gap:8px}.stat{min-width:100px;padding:11px 13px}.stat .v{font-size:18px}
  .wall{grid-template-columns:1fr}
}
@media(min-width:881px){#tabbar{display:none}}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="login">
  <div class="brand"><div class="tvmark"><i></i></div>6Signage</div>
  <div class="eyebrow">Painel de controle de telas</div>
  <input id="lemail" type="email" placeholder="E-mail" autocomplete="username">
  <input id="lpass" type="password" placeholder="Senha" autocomplete="current-password">
  <button class="btn" onclick="login()">Entrar</button>
  <div id="lerr"></div>
</div>

<div id="app">
  <aside>
    <div class="brand"><div class="tvmark"><i></i></div>6Signage</div>
    <nav id="sidenav"></nav>
    <div class="userbox"><b id="uemail"></b>
      <button class="btn ghost sm" onclick="logout()">Sair</button></div>
  </aside>
  <div>
    <div id="topbar">
      <div class="brand"><div class="tvmark"><i></i></div>6Signage</div>
      <button class="btn ghost sm" onclick="logout()">Sair</button>
    </div>
    <main>
      <section id="tab-devices"></section>
      <section id="tab-playlists" class="hidden"></section>
      <section id="tab-media" class="hidden"></section>
      <section id="tab-groups" class="hidden"></section>
    </main>
  </div>
</div>
<div id="tabbar"></div>
<div id="toasts"></div>

<script>
let token = localStorage.getItem('token');
const $ = s => document.querySelector(s);
const esc = s => (s??'').toString().replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const ICONS = {
  devices:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
  playlists:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h13M3 12h13M3 18h9"/><path d="M19 10v8m0-8 3 2m-3-2-3 2" stroke-linecap="round"/></svg>',
  media:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>',
  groups:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>'
};
const TABS = [
  ['devices','Telas'], ['playlists','Playlists'], ['media','Mídia'], ['groups','Grupos']
];

function toast(msg, kind='') {
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.textContent = msg;
  $('#toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

async function api(path, opts={}) {
  opts.headers = Object.assign({'Authorization':'Bearer '+token}, opts.headers||{});
  if (opts.body && !(opts.body instanceof FormData)) {
    opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(opts.body);
  }
  const r = await fetch('/api'+path, opts);
  if (r.status===401){logout();throw new Error('Sessão expirada')}
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error||r.statusText);
  return r.json();
}

async function login(){
  $('#lerr').textContent='';
  try{
    const r = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:$('#lemail').value,password:$('#lpass').value})});
    if(!r.ok){$('#lerr').textContent='✕ E-mail ou senha incorretos';return}
    const j = await r.json();
    token=j.token; localStorage.setItem('token',token);
    localStorage.setItem('email',j.user.email);
    boot();
  }catch(e){$('#lerr').textContent='✕ '+e.message}
}
function logout(){localStorage.removeItem('token');token=null;location.reload()}
$('#lpass').addEventListener('keydown',e=>{if(e.key==='Enter')login()});

function navHtml(){
  return TABS.map(([id,label])=>
    `<button data-tab="${id}" onclick="tab('${id}')">${ICONS[id]}<span>${label}</span></button>`).join('');
}
function boot(){
  $('#login').classList.add('hidden');
  $('#app').classList.add('on');
  $('#uemail').textContent = localStorage.getItem('email')||'';
  $('#sidenav').innerHTML = navHtml();
  $('#tabbar').innerHTML = navHtml();
  tab('devices');
  setInterval(()=>{ if(!$('#tab-devices').classList.contains('hidden')) loadDevices(true) }, 15000);
}

function tab(name){
  document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('main section').forEach(s=>s.classList.add('hidden'));
  $('#tab-'+name).classList.remove('hidden');
  ({devices:loadDevices,playlists:loadPlaylists,media:loadMedia,groups:loadGroups})[name]();
}

/* ================= TELAS ================= */
async function loadDevices(silent){
  let devs, pls, grps;
  try { [devs,pls,grps]=await Promise.all([api('/devices'),api('/playlists'),api('/groups')]); }
  catch(e){ if(!silent) toast(e.message,'err'); return }
  const online = devs.filter(d=>d.status==='online').length;
  const pending = devs.filter(d=>!d.approved).length;

  const stats = `<div class="stats">
    <div class="stat ${online?'ok':''}"><div class="k">Telas online</div><div class="v">${online}<em> / ${devs.length}</em></div></div>
    ${pending?`<div class="stat warn"><div class="k">Aguardando aprovação</div><div class="v">${pending}</div></div>`:''}
    <div class="stat"><div class="k">Playlists</div><div class="v">${pls.length}</div></div>
    <div class="stat"><div class="k">Grupos</div><div class="v">${grps.length}</div></div>
  </div>`;

  const wall = devs.length ? `<div class="wall">`+devs.map(d=>{
    const on = d.status==='online';
    const pill = !d.approved ? '<span class="pill wait">pendente</span>'
      : on ? '<span class="pill on">online</span>' : '<span class="pill off">offline</span>';
    const screenMsg = !d.approved
      ? '<div class="now"><b>Nova tela</b>aguardando aprovação</div>'
      : on && d.current_media
        ? `<div class="now playing"><b>No ar</b>${esc(d.current_media)}</div>`
        : on ? '<div class="now"><b>Online</b>sem playlist atribuída</div>'
             : '<div class="now"><b>Offline</b>sem sinal desta tela</div>';
    return `<div class="tvcard ${on?'online':''}">
      <div class="screen">${screenMsg}<span class="led ${on?'on':'off'}"></span></div>
      <div class="tvbody">
        <div class="tvtitle"><span class="nm">${esc(d.name)}</span>${pill}</div>
        <div class="tvmeta"><span>${esc(d.resolution||'—')}</span><span>${esc(d.group_name||'sem grupo')}</span><span>${esc(d.location||'')}</span></div>
        ${d.approved ? `
        <div class="tvrow">
          <select onchange="assignPl(this.value,'${d.id}')" aria-label="Playlist desta tela">
            <option value="">— sem playlist —</option>
            ${pls.map(p=>`<option value="${p.id}" ${p.id===d.playlist_id?'selected':''}>${esc(p.name)}</option>`).join('')}
          </select>
          <select onchange="setGroup('${d.id}',this.value)" aria-label="Grupo desta tela">
            <option value="">— grupo —</option>
            ${grps.map(g=>`<option value="${g.id}" ${g.id===d.group_id?'selected':''}>${esc(g.name)}</option>`).join('')}
          </select>
        </div>
        <div class="tvactions">
          <button class="btn ghost sm" onclick="cmd('${d.id}','next')" title="Próximo item">⏭ Avançar</button>
          <button class="btn ghost sm" onclick="cmd('${d.id}','restart_player')" title="Reiniciar player">↻</button>
          <span style="flex:1"></span>
          <button class="icobtn del" onclick="delDev('${d.id}')" title="Remover tela">✕</button>
        </div>`
        : `<div class="tvactions">
          <button class="btn approve sm" style="flex:1" onclick="approveDev('${d.id}')">Aprovar esta tela</button>
          <button class="icobtn del" onclick="delDev('${d.id}')" title="Recusar">✕</button>
        </div>`}
      </div>
    </div>`}).join('')+`</div>`
    : `<div class="card"><div class="empty"><div class="eyebrow">Nenhuma tela conectada</div>
       Baixe o agente abaixo, instale no computador Windows da TV e informe o endereço deste servidor.<br>
       A tela aparecerá aqui automaticamente para aprovação.</div></div>`;

  $('#tab-devices').innerHTML =
    `<div class="pagehead"><h2>Telas</h2>
      <span class="row" style="gap:14px"><a class="btn ghost sm" style="text-decoration:none" href="/downloads/6SignagePlayer-win64.zip" download>⬇ Agente Windows</a>
      <a class="btn ghost sm" style="text-decoration:none" href="/downloads/6SignagePlayer.apk" download>⬇ Agente Android</a>
      <span class="eyebrow">atualiza a cada 15 s</span></span></div>`+stats+wall;
}
const approveDev = id => api('/devices/'+id,{method:'PUT',body:{approved:true}}).then(()=>{toast('Tela aprovada','ok');loadDevices()});
const setGroup   = (id,g) => api('/devices/'+id,{method:'PUT',body:{group_id:g||null}}).then(()=>loadDevices(true));
const assignPl   = (pl,dev) => pl && api('/playlists/'+pl+'/assign',{method:'POST',body:{device_id:dev}}).then(()=>{toast('Playlist atribuída — a tela vai atualizar em instantes','ok');loadDevices(true)});
const cmd        = (id,c) => api('/devices/'+id+'/command',{method:'POST',body:{command:c}}).then(r=>toast(r.delivered?'Comando enviado':'Tela offline — comando não entregue',r.delivered?'ok':'err'));
const delDev     = id => confirm('Remover esta tela do painel?') && api('/devices/'+id,{method:'DELETE'}).then(()=>{toast('Tela removida');loadDevices()});

/* ================= PLAYLISTS ================= */
async function loadPlaylists(){
  const [pls,med]=await Promise.all([api('/playlists'),api('/media')]);
  window._pls=pls;
  $('#tab-playlists').innerHTML =
    `<div class="pagehead"><h2>Playlists</h2></div>
    <div class="card"><div class="row">
      <input id="plname" class="grow" placeholder="Nome da nova playlist">
      <button class="btn" onclick="createPl()">Criar playlist</button>
    </div></div>`+
    (pls.length ? pls.map(p=>{
      const total = p.items.reduce((s,it)=>s+(it.duration_override||it.duration_seconds||0),0);
      return `<div class="card">
      <h3><span>${esc(p.name)} <span class="eyebrow" style="margin-left:8px">${p.items.length} itens · ${total}s por ciclo</span></span>
        <button class="btn danger sm" onclick="delPl('${p.id}')">Excluir</button></h3>
      <div class="list">
      ${p.items.map((it,i)=>`<div class="item">
        <span class="pos">${String(i+1).padStart(2,'0')}</span>
        ${it.file_type==='image'?`<img class="thumb" src="${esc(it.file_path)}" alt="">`:'<div class="thumb">▶</div>'}
        <div class="grow">${esc(it.filename)}
          <div class="sub">${it.duration_override||it.duration_seconds||'auto'}s · ${it.transition_type}</div></div>
        <button class="icobtn" onclick="movePl('${p.id}',${i},-1)" title="Subir">↑</button>
        <button class="icobtn" onclick="movePl('${p.id}',${i},1)" title="Descer">↓</button>
        <button class="icobtn del" onclick="rmItem('${p.id}',${i})" title="Remover">✕</button>
      </div>`).join('') || '<div class="empty">Playlist vazia — adicione mídias abaixo.</div>'}
      </div>
      <div class="row" style="margin-top:14px">
        <select id="add-${p.id}" class="grow"><option value="">— escolher mídia da biblioteca —</option>
          ${med.map(m=>`<option value="${m.id}">${esc(m.filename)}</option>`).join('')}</select>
        <input id="dur-${p.id}" type="number" min="1" placeholder="segundos" style="width:110px">
        <button class="btn sm" onclick="addItem('${p.id}')">Adicionar</button>
      </div>
    </div>`}).join('')
    : `<div class="card"><div class="empty"><div class="eyebrow">Nenhuma playlist</div>Crie a primeira playlist acima e monte a sequência de exibição.</div></div>`);
}
const createPl=()=>{const n=$('#plname').value.trim();if(!n)return toast('Dê um nome à playlist','err');
  api('/playlists',{method:'POST',body:{name:n}}).then(()=>{toast('Playlist criada','ok');loadPlaylists()})};
const delPl=id=>confirm('Excluir esta playlist? As telas que a exibem ficarão sem conteúdo.')&&api('/playlists/'+id,{method:'DELETE'}).then(()=>{toast('Playlist excluída');loadPlaylists()});
function itemsOf(id){return window._pls.find(p=>p.id===id).items.map(it=>({media_id:it.media_id,duration_override:it.duration_override,transition_type:it.transition_type}))}
function saveItems(id,items){return api('/playlists/'+id+'/items',{method:'PUT',body:{items}}).then(loadPlaylists)}
function addItem(id){const m=$('#add-'+id).value;if(!m)return;const items=itemsOf(id);
  items.push({media_id:m,duration_override:parseInt($('#dur-'+id).value)||null,transition_type:'fade'});
  saveItems(id,items).then(()=>toast('Mídia adicionada — telas notificadas','ok'))}
function rmItem(id,i){const items=itemsOf(id);items.splice(i,1);saveItems(id,items)}
function movePl(id,i,dir){const items=itemsOf(id);const j=i+dir;if(j<0||j>=items.length)return;
  [items[i],items[j]]=[items[j],items[i]];saveItems(id,items)}

/* ================= MÍDIA ================= */
async function loadMedia(){
  const med=await api('/media');
  $('#tab-media').innerHTML =
    `<div class="pagehead"><h2>Biblioteca de mídia</h2><span class="eyebrow">${med.length} arquivos</span></div>
    <div class="drop" id="drop" tabindex="0" role="button" aria-label="Enviar arquivos">
      <b>Clique para enviar</b> ou arraste arquivos aqui
      <div class="sub">MP4 · MKV · WEBM · JPG · PNG · WEBP — até 1 GB</div>
    </div>
    <input type="file" id="upfile" class="hidden" multiple accept=".mp4,.mkv,.webm,.jpg,.jpeg,.png,.webp">`+
    (med.length ? `<div class="mediagrid">`+med.map(m=>`<div class="mcard">
      <div class="mthumb">${m.file_type==='image'?`<img src="${esc(m.file_path)}" alt="" loading="lazy">`:'▶'}</div>
      <div class="minfo"><div class="grow">${esc(m.filename)}
        <div class="sub">${(m.file_size/1048576).toFixed(1)} MB</div></div>
        <button class="icobtn del" onclick="delMedia('${m.id}')" title="Excluir">✕</button></div>
    </div>`).join('')+`</div>`
    : `<div class="card"><div class="empty"><div class="eyebrow">Biblioteca vazia</div>Envie os vídeos e imagens que vão passar nas TVs.</div></div>`);

  const drop=$('#drop'), file=$('#upfile');
  drop.onclick=()=>file.click();
  drop.onkeydown=e=>{if(e.key==='Enter'||e.key===' ')file.click()};
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
  drop.ondragleave=()=>drop.classList.remove('over');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');uploadFiles(e.dataTransfer.files)};
  file.onchange=()=>uploadFiles(file.files);
}
async function uploadFiles(files){
  for (const f of files) {
    toast(`Enviando ${f.name}…`);
    const fd=new FormData();fd.append('file',f);
    try{await api('/media/upload',{method:'POST',body:fd});toast(`${f.name} enviado`,'ok')}
    catch(e){toast(`${f.name}: ${e.message}`,'err')}
  }
  loadMedia();
}
const delMedia=id=>confirm('Excluir esta mídia? Ela sairá das playlists que a usam.')&&api('/media/'+id,{method:'DELETE'}).then(()=>{toast('Mídia excluída');loadMedia()});

/* ================= GRUPOS ================= */
async function loadGroups(){
  const [grps,pls,devs]=await Promise.all([api('/groups'),api('/playlists'),api('/devices')]);
  $('#tab-groups').innerHTML =
    `<div class="pagehead"><h2>Grupos de telas</h2></div>
    <div class="card"><div class="row">
      <input id="gname" class="grow" placeholder="Nome do novo grupo (ex.: Recepção, Fábrica)">
      <button class="btn" onclick="createGr()">Criar grupo</button>
    </div></div>`+
    (grps.length ? `<div class="card"><div class="list">`+grps.map(g=>{
      const count = devs.filter(d=>d.group_id===g.id).length;
      return `<div class="item">
      <div class="grow"><b>${esc(g.name)}</b><div class="sub">${count} tela${count===1?'':'s'} neste grupo</div></div>
      <select onchange="assignGr(this.value,'${g.id}');this.value=''" aria-label="Atribuir playlist ao grupo">
        <option value="">— enviar playlist ao grupo —</option>
        ${pls.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}
      </select>
      <button class="icobtn del" onclick="delGr('${g.id}')" title="Excluir grupo">✕</button>
    </div>`}).join('')+`</div></div>`
    : `<div class="card"><div class="empty"><div class="eyebrow">Nenhum grupo</div>Grupos permitem enviar uma playlist para várias telas de uma vez.</div></div>`);
}
const createGr=()=>{const n=$('#gname').value.trim();if(!n)return toast('Dê um nome ao grupo','err');
  api('/groups',{method:'POST',body:{name:n}}).then(()=>{toast('Grupo criado','ok');loadGroups()})};
const delGr=id=>confirm('Excluir grupo? As telas continuam, apenas saem do grupo.')&&api('/groups/'+id,{method:'DELETE'}).then(loadGroups);
const assignGr=(pl,g)=>pl&&api('/playlists/'+pl+'/assign',{method:'POST',body:{group_id:g}}).then(()=>toast('Playlist enviada a todas as telas do grupo','ok'));

if(token)boot();
</script>
</body>
</html>
