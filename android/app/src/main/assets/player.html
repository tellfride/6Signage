<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
:root{--wx-bg1:#0B2A6B;--wx-bg2:#123A8C;--accent:#4C8DFF;--wx-w:22%;--tk-h:12%}
html,body{margin:0;padding:0;background:#000;width:100vw;height:100vh;overflow:hidden;cursor:none;
  font-family:system-ui,'Segoe UI',sans-serif;color:#fff}

/* palco do conteúdo (encolhe conforme os overlays ativos) */
#stage{position:absolute;inset:0;transition:left .35s,bottom .35s;overflow:hidden}
body.has-wx #stage{left:var(--wx-w)}
body.has-ticker #stage{bottom:var(--tk-h)}
.slide{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity .6s;background:#000}
.slide.show{opacity:1}
.slide.cut{transition:none}

/* ---- barra lateral (clima) — tudo em em, escalado pela largura do painel ---- */
#wx{position:absolute;left:0;top:0;bottom:0;width:var(--wx-w);display:none;flex-direction:column;
  padding:1.2em .9em;gap:.6em;box-sizing:border-box;font-size:16px;overflow:hidden;
  background:linear-gradient(165deg,var(--wx-bg1),var(--wx-bg2));box-shadow:inset -6px 0 26px rgba(0,0,0,.35)}
body.has-wx #wx{display:flex}
body.has-wx.has-ticker #wx{bottom:var(--tk-h)}
#wxTime{font-size:2.4em;font-weight:800;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
#wxDate{font-size:.62em;color:#AEC4FF;margin-top:.4em;text-transform:capitalize}
.wx-now{margin-top:auto}
.wx-main{display:flex;align-items:center;gap:.15em}
#wxIcon{font-size:1.9em;line-height:1}
#wxTemp{font-size:2.6em;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
#wxCond{font-size:.8em;font-weight:600;color:#E6EEFF;margin-top:.15em}
#wxCity{font-size:.6em;color:#AEC4FF;margin-top:.3em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#wxTom{font-size:.68em;color:#CFE0FF;border-top:1px solid rgba(255,255,255,.16);padding-top:.7em;
  display:flex;align-items:center;gap:.35em;white-space:nowrap}
#wxTom .tm-lb{text-transform:uppercase;letter-spacing:.12em;color:#8FA9E8;font-size:.8em;font-weight:700}
#wxTom b{font-weight:800}
#wxTom .tm-min{color:#8FA9E8}
.wx-extra{display:flex;gap:.9em;font-size:.58em;color:#AEC4FF;
  border-top:1px solid rgba(255,255,255,.16);padding-top:.7em}

/* ---- rodapé de avisos ---- */
#ticker{position:absolute;left:0;right:0;bottom:0;height:var(--tk-h);display:none;align-items:stretch;
  font-size:24px;overflow:hidden;background:linear-gradient(90deg,#081F52,#0E2E73);border-top:2px solid var(--accent)}
body.has-ticker #ticker{display:flex}
.tick-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--accent);color:#fff;padding:0 .7em;min-width:2.8em}
#tickDay{font-size:1.15em;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
#tickMon{font-size:.4em;font-weight:700;letter-spacing:.18em}
.tick-label{display:flex;align-items:center;padding:0 .7em;font-weight:800;font-size:.6em;
  letter-spacing:.08em;color:#fff;background:rgba(255,255,255,.08);white-space:nowrap}
.tick-view{flex:1;overflow:hidden;display:flex;align-items:center;min-width:0}
/* dois segmentos idênticos + translate de -50% = rolagem contínua e sem buraco,
   as mensagens percorrem a faixa inteira até a borda esquerda */
.tick-track{display:flex;white-space:nowrap;will-change:transform;font-size:.92em;font-weight:600;color:#EAF1FF}
.tick-seg{flex:0 0 auto;padding-right:3em}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ---- status/espera (dentro do palco) ---- */
#statusWrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:#8A93A8;font-family:ui-monospace,Consolas,monospace;font-size:18px;text-align:center;padding:40px;background:#000}
#statusWrap .tv{width:76px;height:56px;border:3px solid var(--accent);border-radius:8px;position:relative;opacity:.9}
#statusWrap .tv::after{content:'';position:absolute;left:50%;bottom:-13px;transform:translateX(-50%);width:30px;height:4px;background:var(--accent);border-radius:3px}
#statusWrap .tv i{position:absolute;right:6px;bottom:6px;width:9px;height:9px;border-radius:50%;background:#3DDC97;box-shadow:0 0 10px #3DDC97;animation:pulse 1.6s infinite}
@keyframes pulse{50%{opacity:.35}}
#statusWrap small{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#4A5468}
</style>
</head>
<body>
<div id="stage">
  <div id="statusWrap">
    <div class="tv"><i></i></div>
    <span id="statusText">Conectando ao servidor…</span>
    <small>6Signage Player · botão VOLTAR abre a configuração</small>
  </div>
</div>

<aside id="wx">
  <div><div id="wxTime">--:--</div><div id="wxDate">—</div></div>
  <div class="wx-now">
    <div class="wx-main"><span id="wxIcon">🌡️</span><span id="wxTemp">--°</span></div>
    <div id="wxCond">—</div>
    <div id="wxCity">—</div>
  </div>
  <div id="wxTom"></div>
  <div class="wx-extra"><span id="wxHum">💧 --%</span><span id="wxWind">🌬 --</span></div>
</aside>

<footer id="ticker">
  <div class="tick-badge"><span id="tickDay">--</span><span id="tickMon">—</span></div>
  <div class="tick-label">AVISOS</div>
  <div class="tick-view"><div id="tickTrack" class="tick-track"></div></div>
</footer>

<script>
// Ponte nativa Android (substitui o preload do Electron)
window.signage = {
  getConfig: () => Promise.resolve(JSON.parse(NativeBridge.getConfig())),
  testServer: (url) => Promise.resolve(JSON.parse(NativeBridge.testServer(url))),
  saveConfig: (cfg) => NativeBridge.saveConfig(cfg.server, cfg.device_name),
  checkUpdate: () => NativeBridge.checkUpdate(),
  pruneCache: (keep) => NativeBridge.pruneCache(JSON.stringify(keep || [])),
  cacheMedia: ({url, checksum}) => new Promise((res, rej) => {
    const id = ++window.__seq; window.__pending[id] = {res, rej};
    NativeBridge.cacheMedia(id, url, checksum || '');
  })
};
window.__pending = {}; window.__seq = 0;
window.__cacheDone = (id, result, ok) => {
  const p = window.__pending[id]; delete window.__pending[id];
  if (p) ok ? p.res(result) : p.rej(new Error(result));
};

let cfg, manifest = { items: [] }, idx = 0, timer = null, current = null, paused = false, clockTimer = null;
const $ = id => document.getElementById(id);
const stage = $('stage'), status = $('statusWrap'), statusText = $('statusText');
const TICKER_SPEED = 110; // px por segundo

async function register() {
  const r = await fetch(cfg.server + '/api/devices/register', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      device_key: cfg.deviceKey, device_name: cfg.deviceName,
      resolution: `${screen.width}x${screen.height}`,
      os_version: cfg.osVersion || navigator.platform, client_version: '1.3.0',
      platform: cfg.platform || 'windows'
    })
  });
  return r.json();
}

async function syncManifest() {
  try {
    const r = await fetch(`${cfg.server}/api/player/manifest?device_key=${cfg.deviceKey}`);
    const m = await r.json();
    renderLayout(m.layout);
    const changed = JSON.stringify(m.items) !== JSON.stringify(manifest.items);
    manifest = m;
    if (!m.items.length) {
      statusText.textContent = m.playlist ? 'Playlist vazia — adicione mídias no painel' : 'Tela registrada — aguardando aprovação no painel';
      status.style.display = 'flex';
      stopPlayback();
    } else if (changed) {
      status.style.display = 'none';
      for (const it of m.items) {
        try { it.localUrl = await window.signage.cacheMedia({ url: it.url, checksum: it.checksum }); }
        catch (e) { console.error(e); it.localUrl = cfg.server + it.url; }
      }
      try { if (window.signage.pruneCache) window.signage.pruneCache([...m.items.map(it => it.checksum), ...currentBgChecksums].filter(Boolean)); } catch {}
      idx = 0; play();
    }
  } catch (e) {
    statusText.textContent = 'Sem conexão — executando cache local';
    console.error(e);
  }
}

/* ---------- overlays ---------- */
function wmo(code) {
  const m = {0:['☀️','Céu limpo'],1:['🌤️','Predom. limpo'],2:['⛅','Parc. nublado'],3:['☁️','Nublado'],
    45:['🌫️','Nevoeiro'],48:['🌫️','Nevoeiro'],51:['🌦️','Garoa'],53:['🌦️','Garoa'],55:['🌦️','Garoa forte'],
    56:['🌧️','Garoa gelada'],57:['🌧️','Garoa gelada'],61:['🌧️','Chuva fraca'],63:['🌧️','Chuva'],65:['🌧️','Chuva forte'],
    66:['🌧️','Chuva gelada'],67:['🌧️','Chuva gelada'],71:['🌨️','Neve fraca'],73:['🌨️','Neve'],75:['🌨️','Neve forte'],
    77:['🌨️','Granizo'],80:['🌦️','Pancadas'],81:['🌧️','Pancadas'],82:['⛈️','Temporal'],
    85:['🌨️','Neve'],86:['🌨️','Neve forte'],95:['⛈️','Tempestade'],96:['⛈️','Tempestade'],99:['⛈️','Tempestade']};
  return m[code] || ['🌡️','—'];
}
function tickClock() {
  const now = new Date();
  const dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  $('wxTime').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  $('wxDate').textContent = dias[now.getDay()] + ' · ' + now.getDate() + ' ' + meses[now.getMonth()];
  $('tickDay').textContent = String(now.getDate()).padStart(2,'0');
  $('tickMon').textContent = meses[now.getMonth()].toUpperCase();
}

let tickerSig = '';
function setTicker(msg) {
  const view = document.querySelector('.tick-view'), track = $('tickTrack');
  const sig = msg + '|' + view.clientWidth + '|' + $('ticker').style.fontSize;
  if (sig === tickerSig) return;           // não reinicia a animação a cada sincronismo
  tickerSig = sig;
  track.style.animation = 'none';
  track.innerHTML = '';
  const seg = document.createElement('span');
  seg.className = 'tick-seg';
  seg.textContent = msg;
  track.appendChild(seg);
  // repete até o segmento cobrir a largura visível (senão sobra um vão no loop)
  let guard = 0;
  while (seg.offsetWidth < view.clientWidth && guard++ < 30) seg.textContent += '   •   ' + msg;
  track.appendChild(seg.cloneNode(true));  // 2 segmentos idênticos = loop perfeito
  const dur = Math.max(8, seg.offsetWidth / TICKER_SPEED);
  void track.offsetWidth;                  // reflow para reiniciar a animação
  track.style.animation = `scroll ${dur}s linear infinite`;
}

// Fundo cor sólida ou imagem (com véu escuro p/ legibilidade); 'auto' preserva o gradiente do CSS.
const bgSig = {};
async function applyBg(elId, mode, color, image, checksum) {
  const sig = mode + '|' + (color || '') + '|' + (image || '');
  if (bgSig[elId] === sig) return;
  bgSig[elId] = sig;
  const el = $(elId);
  if (mode === 'color' && color) {
    el.style.backgroundColor = color; el.style.backgroundImage = 'none';
  } else if (mode === 'image' && image) {
    let url = cfg.server + image;
    try { url = await window.signage.cacheMedia({ url: image, checksum }); } catch (e) { console.error('fundo:', e); }
    el.style.backgroundColor = 'transparent';
    el.style.backgroundImage = `linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.55)), url("${url}")`;
    el.style.backgroundSize = 'cover'; el.style.backgroundPosition = 'center';
  } else {
    el.style.backgroundColor = ''; el.style.backgroundImage = '';
  }
}
let currentBgChecksums = [];

function renderLayout(L) {
  L = L || {};
  const wx = L.weather || {}, tk = L.ticker || {};
  const msg = (tk.text || '').split('\n').map(s => s.trim()).filter(Boolean).join('   •   ');
  const tickerOn = !!(tk.enabled && msg);

  document.body.classList.toggle('has-wx', !!wx.enabled);
  document.body.classList.toggle('has-ticker', tickerOn);
  document.documentElement.style.setProperty('--wx-w', (wx.width || 22) + '%');
  document.documentElement.style.setProperty('--tk-h', (tk.height || 12) + '%');
  currentBgChecksums = [wx.bgMode === 'image' && wx.bgChecksum, tk.bgMode === 'image' && tk.bgChecksum].filter(Boolean);
  applyBg('wx', wx.bgMode, wx.bgColor, wx.bgImage, wx.bgChecksum);
  applyBg('ticker', tk.bgMode, tk.bgColor, tk.bgImage, tk.bgChecksum);

  if (wx.enabled) {
    const [icon, text] = wmo(wx.code);
    $('wxIcon').textContent = icon;
    $('wxTemp').textContent = (wx.temp != null ? wx.temp : '--') + '°';
    $('wxCond').textContent = wx.temp != null ? text : 'sem dados';
    $('wxCity').textContent = '📍 ' + (wx.city || '');
    $('wxHum').textContent = '💧 ' + (wx.humidity != null ? wx.humidity + '%' : '--');
    $('wxWind').textContent = '🌬 ' + (wx.wind != null ? wx.wind + ' km/h' : '--');
    if (wx.tomorrow) {
      const [ti] = wmo(wx.tomorrow.code);
      $('wxTom').innerHTML = `<span class="tm-lb">Amanhã</span> ${ti} <b>${wx.tomorrow.max}°</b>` +
        `<span class="tm-min">/ ${wx.tomorrow.min}°</span>`;
      $('wxTom').style.display = 'flex';
    } else $('wxTom').style.display = 'none';
  }

  // escala tipográfica proporcional ao tamanho escolhido para cada faixa
  requestAnimationFrame(() => {
    const wxEl = $('wx'), tkEl = $('ticker');
    if (wxEl.clientWidth) wxEl.style.fontSize = Math.max(10, wxEl.clientWidth / 13) + 'px';
    if (tkEl.clientHeight) tkEl.style.fontSize = Math.max(10, tkEl.clientHeight / 3) + 'px';
    if (tickerOn) setTicker(msg);
  });

  const needClock = wx.enabled || tickerOn;
  if (needClock && !clockTimer) { tickClock(); clockTimer = setInterval(tickClock, 1000); }
  if (!needClock && clockTimer) { clearInterval(clockTimer); clockTimer = null; }
}
window.addEventListener('resize', () => { tickerSig = ''; renderLayout(manifest.layout); });

/* ---------- reprodução ---------- */
function stopPlayback() { clearTimeout(timer); if (current) { current.remove(); current = null; } }
function play() {
  if (paused || !manifest.items.length) return;
  clearTimeout(timer);
  const it = manifest.items[idx % manifest.items.length];
  const old = current;
  let el;
  if (it.file_type === 'video') {
    el = document.createElement('video');
    el.src = it.localUrl; el.autoplay = true; el.muted = false;
    el.onended = next;
    el.onerror = () => { console.error('erro vídeo', it.url); setTimeout(next, 2000); };
  } else {
    el = document.createElement('img');
    el.src = it.localUrl;
    timer = setTimeout(next, (it.duration || 10) * 1000);
  }
  el.className = 'slide' + (it.transition_type === 'cut' ? ' cut' : '');
  stage.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  if (old) { old.classList.remove('show'); setTimeout(() => old.remove(), 700); }
  current = el;
  window._currentName = it.url.split('/').pop();
}
function next() { idx++; play(); }

function heartbeat() {
  fetch(cfg.server + '/api/player/heartbeat', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ device_key: cfg.deviceKey, status: 'online', current_media: window._currentName || null })
  }).catch(() => {});
}

function connectWS() {
  const ws = new WebSocket(cfg.server.replace(/^http/, 'ws') + '/ws?device_key=' + cfg.deviceKey);
  ws.onmessage = ev => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'manifest_updated') syncManifest();
    if (msg.type === 'command') {
      if (msg.command === 'next') next();
      if (msg.command === 'pause') { paused = true; clearTimeout(timer); if (current && current.pause) current.pause(); }
      if (msg.command === 'play') { paused = false; if (current && current.play) current.play(); else play(); }
      if (msg.command === 'restart_player') location.reload();
      if (msg.command === 'check_update' && window.signage.checkUpdate) window.signage.checkUpdate();
    }
  };
  ws.onclose = () => setTimeout(connectWS, 5000);
}

(async () => {
  cfg = await window.signage.getConfig();
  try { await register(); } catch { statusText.textContent = 'Servidor inacessível: ' + cfg.server; }
  connectWS();
  await syncManifest();
  setInterval(syncManifest, 60000);
  setInterval(heartbeat, 30000);
  heartbeat();
})();
</script>
</body>
</html>
