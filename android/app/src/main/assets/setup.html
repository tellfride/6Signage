<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>6Signage — Configuração</title>
<style>
:root{
  --bg:#0B0E14; --panel:#121826; --line:#232D42; --text:#E8ECF4;
  --mut:#8A93A8; --acc:#5B8CFF; --ok:#3DDC97; --err:#FF6B6B;
  --mono:ui-monospace,'Cascadia Mono','Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;padding:32px 36px;user-select:none}
.mark{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.tv{width:38px;height:28px;border:2px solid var(--acc);border-radius:5px;position:relative}
.tv::after{content:'';position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);
  width:16px;height:2px;background:var(--acc);border-radius:2px}
.tv i{position:absolute;right:3px;bottom:3px;width:5px;height:5px;border-radius:50%;background:var(--ok);
  box-shadow:0 0 6px var(--ok)}
h1{font-size:20px;letter-spacing:.5px}
.sub{font-family:var(--mono);font-size:11px;color:var(--mut);text-transform:uppercase;
  letter-spacing:2px;margin-bottom:30px}
label{display:block;font-family:var(--mono);font-size:11px;color:var(--mut);
  text-transform:uppercase;letter-spacing:1.5px;margin:0 0 7px 2px}
input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
  padding:13px 14px;border-radius:9px;font-size:15px;margin-bottom:20px;outline:none;
  font-family:var(--mono)}
input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(91,140,255,.15)}
.hint{font-size:12px;color:var(--mut);margin:-14px 2px 20px}
button{width:100%;padding:14px;border:0;border-radius:9px;font-size:15px;font-weight:600;
  cursor:pointer;margin-bottom:10px}
button:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
.primary{background:var(--acc);color:#fff}
.primary:disabled{opacity:.45;cursor:default}
.ghost{background:transparent;border:1px solid var(--line);color:var(--mut)}
#result{font-family:var(--mono);font-size:12.5px;min-height:36px;padding:9px 2px}
#result.ok{color:var(--ok)} #result.err{color:var(--err)}
footer{margin-top:auto;font-family:var(--mono);font-size:10.5px;color:#4A5468;
  text-transform:uppercase;letter-spacing:1px;line-height:1.9}
kbd{border:1px solid var(--line);border-radius:4px;padding:1px 5px;color:var(--mut)}
</style>
</head>
<body>
  <div class="mark"><div class="tv"><i></i></div><h1>6Signage Player</h1></div>
  <div class="sub">Configuração desta tela</div>

  <label for="server">Endereço do servidor</label>
  <input id="server" placeholder="http://10.30.200.200:3000" spellcheck="false">
  <div class="hint">IP e porta do servidor 6Signage na sua rede.</div>

  <label for="name">Nome desta tela</label>
  <input id="name" placeholder="TV_Recepcao" spellcheck="false">
  <div class="hint">Como esta TV aparecerá no painel de controle.</div>

  <div id="result"></div>

  <button class="ghost" id="btnTest">Testar conexão</button>
  <button class="primary" id="btnSave" disabled>Salvar e iniciar exibição</button>

  <footer>
    Bot&atilde;o VOLTAR do controle alterna entre player e configura&ccedil;&atilde;o
  </footer>

<script>
// Ponte nativa Android (substitui o preload do Electron)
window.signage = {
  getConfig: () => Promise.resolve(JSON.parse(NativeBridge.getConfig())),
  testServer: (url) => Promise.resolve(JSON.parse(NativeBridge.testServer(url))),
  saveConfig: (cfg) => NativeBridge.saveConfig(cfg.server, cfg.device_name),
  cacheMedia: ({url, checksum}) => new Promise((res, rej) => {
    const id = ++window.__seq; window.__pending[id] = {res, rej};
    NativeBridge.cacheMedia(id, url, checksum || '');
  })
};
window.__pending = {}; window.__seq = 0;
window.__cacheDone = (id, result, ok) => {
  const p = window.__pending[id]; delete window.__pending[id];
  if (p) ok ? p.res(result) : p.rej(new Error(result));
};

const $ = s => document.querySelector(s);
const result = $('#result'), btnSave = $('#btnSave'), btnTest = $('#btnTest');
let tested = false;

window.signage.getConfig().then(c => {
  if (c.server) $('#server').value = c.server;
  $('#name').value = c.deviceName || c.hostname || '';
});

function normalize(u) {
  u = u.trim();
  if (u && !/^https?:\/\//i.test(u)) u = 'http://' + u;
  return u.replace(/\/+$/, '');
}

async function test() {
  const url = normalize($('#server').value);
  if (!url) { result.className = 'err'; result.textContent = '✕ Informe o endereço do servidor.'; return; }
  $('#server').value = url;
  result.className = ''; result.textContent = '… testando ' + url;
  btnTest.disabled = true;
  const r = await window.signage.testServer(url);
  btnTest.disabled = false;
  if (r.ok) {
    tested = true; btnSave.disabled = false;
    result.className = 'ok';
    result.textContent = '✓ Servidor 6Signage encontrado' + (r.version ? ' (v' + r.version + ')' : '');
  } else {
    tested = false; btnSave.disabled = true;
    result.className = 'err';
    result.textContent = '✕ Servidor não encontrado. Verifique o IP, a porta e o firewall.';
  }
}

btnTest.onclick = test;
$('#server').addEventListener('input', () => { tested = false; btnSave.disabled = true; });
$('#server').addEventListener('keydown', e => { if (e.key === 'Enter') test(); });
$('#name').addEventListener('keydown', e => { if (e.key === 'Enter' && tested) btnSave.click(); });

btnSave.onclick = () => {
  const name = $('#name').value.trim() || 'Nova tela';
  btnSave.disabled = true;
  btnSave.textContent = 'Salvando e reiniciando…';
  window.signage.saveConfig({ server: normalize($('#server').value), device_name: name });
};
</script>
</body>
</html>
