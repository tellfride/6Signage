<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>6Signage — Configurar esta tela</title>
<style>
:root{
  --ink:#0A0D12; --panel:#12171F; --well:#0E131A; --line:#212936;
  --text:#E6EAF0; --muted:#8B95A6; --faint:#59637A;
  --live:#2FD07E; --dead:#FF5D5D; --act:#4C8DFF; --act-bg:rgba(76,141,255,.14);
  --mono:ui-monospace,'Cascadia Mono',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--text);font-family:system-ui,'Segoe UI',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;padding:30px 34px;user-select:none;font-size:14.5px}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(480px 240px at 50% 0%, var(--act-bg), transparent 70%),
             repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,.008) 3px 4px)}
.brand{display:flex;align-items:center;gap:10px;font-weight:750;font-size:18px;letter-spacing:-.01em;margin-bottom:5px}
.logo{width:28px;height:22px;border:2px solid var(--text);border-radius:4px;position:relative;flex:0 0 auto}
.logo::after{content:'';position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);width:11px;height:2px;background:var(--text)}
.logo i{position:absolute;right:3px;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--live);box-shadow:0 0 5px var(--live)}
.lbl{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.16em;color:var(--faint)}
.sub{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:28px}
label{display:block;font-family:var(--mono);font-size:10.5px;color:var(--faint);
  text-transform:uppercase;letter-spacing:.16em;margin:0 0 7px 2px}
input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
  padding:13px 14px;border-radius:9px;font-size:15px;margin-bottom:18px;outline:none;font-family:var(--mono)}
input:focus{border-color:var(--act);box-shadow:0 0 0 3px var(--act-bg)}
.hint{font-size:12px;color:var(--muted);margin:-12px 2px 18px}
button{width:100%;padding:14px;border:0;border-radius:9px;font-size:15px;font-weight:600;
  cursor:pointer;margin-bottom:10px;font-family:inherit}
button:focus-visible{outline:2px solid var(--act);outline-offset:2px}
.primary{background:var(--act);color:#fff}
.primary:hover{filter:brightness(1.08)}
.primary:disabled{opacity:.45;cursor:default;filter:none}
.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
.ghost:hover{color:var(--text);border-color:var(--faint)}
#result{font-family:var(--mono);font-size:12.5px;min-height:36px;padding:9px 2px}
#result.ok{color:var(--live)} #result.err{color:var(--dead)}
footer{margin-top:auto;font-family:var(--mono);font-size:10px;color:var(--faint);
  text-transform:uppercase;letter-spacing:.12em;line-height:2}
kbd{border:1px solid var(--line);border-radius:4px;padding:1px 5px;color:var(--muted)}
</style>
</head>
<body>
  <div class="brand"><span class="logo"><i></i></span>6Signage Player</div>
  <div class="sub">Configurar esta tela</div>

  <label for="server">Endereço do servidor</label>
  <input id="server" placeholder="http://10.30.200.200:3000" spellcheck="false">
  <div class="hint">IP e porta do servidor 6Signage na sua rede.</div>

  <label for="name">Nome desta tela</label>
  <input id="name" placeholder="TV_Recepcao" spellcheck="false">
  <div class="hint">Como esta TV aparece no console.</div>

  <div id="result"></div>

  <button class="ghost" id="btnTest">Testar conexão</button>
  <button class="primary" id="btnSave" disabled>Salvar e iniciar exibição</button>

  <footer>
    Reconfigurar: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd> &nbsp;·&nbsp;
    Sair do player: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Q</kbd>
  </footer>

<script>
const $ = s => document.querySelector(s);
const result = $('#result'), btnSave = $('#btnSave'), btnTest = $('#btnTest');
let tested = false;

window.signage.getConfig().then(c => {
  if (c.server) $('#server').value = c.server;
  $('#name').value = c.deviceName || c.hostname || '';
});

function normalize(u) {
  u = u.trim();
  if (u && !/^https?:\/\//i.test(u)) u = 'http://' + u;
  return u.replace(/\/+$/, '');
}

async function test() {
  const url = normalize($('#server').value);
  if (!url) { result.className = 'err'; result.textContent = '✕ Informe o endereço do servidor.'; return; }
  $('#server').value = url;
  result.className = ''; result.textContent = '… testando ' + url;
  btnTest.disabled = true;
  const r = await window.signage.testServer(url);
  btnTest.disabled = false;
  if (r.ok) {
    tested = true; btnSave.disabled = false;
    result.className = 'ok';
    result.textContent = '✓ Servidor 6Signage encontrado' + (r.version ? ' (v' + r.version + ')' : '');
  } else {
    tested = false; btnSave.disabled = true;
    result.className = 'err';
    result.textContent = '✕ Servidor não encontrado. Verifique o IP, a porta e o firewall.';
  }
}

btnTest.onclick = test;
$('#server').addEventListener('input', () => { tested = false; btnSave.disabled = true; });
$('#server').addEventListener('keydown', e => { if (e.key === 'Enter') test(); });
$('#name').addEventListener('keydown', e => { if (e.key === 'Enter' && tested) btnSave.click(); });

btnSave.onclick = () => {
  const name = $('#name').value.trim() || 'Nova tela';
  btnSave.disabled = true;
  btnSave.textContent = 'Salvando e reiniciando…';
  window.signage.saveConfig({ server: normalize($('#server').value), device_name: name });
};
</script>
</body>
</html>
